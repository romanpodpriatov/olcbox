name: core verify

# Validates that the config builders emit configs the PINNED core binaries
# actually accept (schema check against the real binaries). sing-box handles
# reality+hy2+olcrtc; Xray-core handles xhttp (sing-box can't). No device needed.
on:
  push:
    branches: [feat/singbox-ci-verify]
  workflow_dispatch:

permissions:
  contents: read

env:
  SINGBOX_VERSION: "1.11.15"
  XRAY_VERSION: "25.3.6"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  config-check:
    name: sing-box config schema check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v7
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v7
        with:
          repository: romanpodpriatov/olcrtc
          ref: proofkit-udp-spike
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Go mobile tooling
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Initialize gomobile
        working-directory: olcrtc
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          gomobile init

      - name: Generate configs from the builders
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          # All net tests (LinkParser, SingBoxConfig, XrayConfig, EngineDispatcher)
          # + the dump tests that emit configs for the check steps below.
          ./gradlew :sharedUI:jvmTest --tests "org.olcbox.app.net.*" --stacktrace
          echo "--- sing-box configs ---"
          for f in sharedUI/build/singbox-configs/*.json; do echo "== $f =="; cat "$f"; echo; done
          echo "--- xray configs ---"
          for f in sharedUI/build/xray-configs/*.json; do echo "== $f =="; cat "$f"; echo; done

      - name: Download pinned sing-box
        run: |
          url="https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          echo "Downloading $url"
          curl -fsSL "$url" -o sb.tar.gz
          tar xzf sb.tar.gz
          mv sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box
          sing-box version

      # Per-transport steps so each verdict is visible via the jobs API (step
      # conclusions are readable without log auth). Core transports must pass;
      # xhttp is allowed to fail (Xray transport — informational).
      - name: check vless-reality
        working-directory: olcbox
        run: sing-box check -c sharedUI/build/singbox-configs/vless-reality.json

      - name: check hysteria2
        working-directory: olcbox
        run: sing-box check -c sharedUI/build/singbox-configs/hysteria2.json

      - name: check olcrtc-socks
        working-directory: olcbox
        run: sing-box check -c sharedUI/build/singbox-configs/olcrtc-socks.json

      - name: Download Xray-core (pinned, fallback to latest)
        run: |
          set -e
          url="https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VERSION}/Xray-linux-64.zip"
          echo "Trying pinned $url"
          if ! curl -fsSL "$url" -o xray.zip; then
            latest=$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
            echo "Pinned v${XRAY_VERSION} not found; falling back to latest $latest"
            curl -fsSL "https://github.com/XTLS/Xray-core/releases/download/${latest}/Xray-linux-64.zip" -o xray.zip
          fi
          mkdir -p xray-bin && (cd xray-bin && unzip -o ../xray.zip)
          chmod +x xray-bin/xray
          echo "USING XRAY:"; ./xray-bin/xray version | head -1

      - name: xray test vless-xhttp
        working-directory: olcbox
        run: ${{ github.workspace }}/xray-bin/xray run -c sharedUI/build/xray-configs/vless-xhttp.json -test

      # End-to-end tunnel proof for the olcrtc-socks chain: a backing SOCKS server
      # stands in for the olcrtc engine (:10808); our generated olcrtc-socks config
      # chains :10809 → :10808 → direct. curling through :10809 proves our config
      # actually carries traffic, not just that it's schema-valid.
      - name: tunnel — olcrtc-socks chain
        working-directory: olcbox
        run: |
          set -e
          cat > /tmp/backing-socks.json <<'JSON'
          { "inbounds": [ { "type": "socks", "listen": "127.0.0.1", "listen_port": 10808 } ],
            "outbounds": [ { "type": "direct" } ] }
          JSON
          echo "start backing socks (stands in for olcrtc engine)"
          sing-box run -c /tmp/backing-socks.json &
          BACK=$!
          echo "start our generated olcrtc-socks config"
          sing-box run -c sharedUI/build/singbox-configs/olcrtc-socks.json &
          CLIENT=$!
          sleep 3
          echo "curl through the chain (:10809 → :10808 → direct)"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 --socks5-hostname 127.0.0.1:10809 http://example.com)
          echo "HTTP via tunnel: $code"
          kill $CLIENT $BACK 2>/dev/null || true
          [ "$code" = "200" ]
